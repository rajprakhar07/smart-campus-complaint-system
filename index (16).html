<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Campus IMS</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; text-align: center; padding: 20px;
    }
    .splash-logo { font-size: 5rem; margin-bottom: 10px; animation: bounceIn 0.8s ease; }
    h1 { color: white; font-size: 2.5rem; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.6); font-size: 1rem; }
    .spinner { margin-top: 20px; }
    @keyframes bounceIn {
      0% { transform: scale(0); opacity:0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="splash-logo">🏛️</div>
  <h1>Smart Campus IMS</h1>
  <p>Loading your dashboard…</p>
  <div class="spinner"></div>
  <script src="js/app.js"></script>
  <script>
    setTimeout(() => {
      const session = APP.getSession();
      if (session) {
        const pages = { student: 'student-dashboard.html', team: 'team-dashboard.html', admin: 'admin-dashboard.html' };
        window.location.href = pages[session.role] || 'login.html';
      } else {
        window.location.href = 'login.html';
      }
    }, 1200);
  </script>
</body>
</html>
